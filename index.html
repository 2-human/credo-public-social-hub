<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Credo Legal — Social Campaign Hub</title>
<style>
  :root{
    --red:#c92028; --ink:#1a1d23; --muted:#6b7280; --line:#e6e8ec; --bg:#f7f8fa;
    --li:#0a66c2; --fb:#1877f2; --card:#fff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--bg);
    display:grid; grid-template-columns:320px minmax(0,1fr) 400px; grid-template-rows:auto auto 1fr; height:100vh;
  }
  a{color:inherit}
  /* topbar */
  .topbar{grid-column:1/-1; display:flex; align-items:center; gap:14px; padding:0 18px;
    background:#fff; border-bottom:1px solid var(--line); z-index:5}
  .brand{display:flex; align-items:center; gap:10px; font-weight:700; white-space:nowrap; flex-shrink:0; min-width:0}
  .brand img{height:24px; width:auto; display:block}
  .brand .t{font-size:14px; min-width:0}
  .brand .t small{display:block; font-weight:500; color:var(--muted); font-size:11px; letter-spacing:.02em; white-space:nowrap}
  .meta{color:var(--muted); font-size:12.5px; margin-left:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1}
  .toolbar{display:flex; gap:8px; align-items:center}
  .toolbar a{font-size:12.5px; color:var(--red); text-decoration:none; border:1px solid var(--line);
    padding:5px 10px; border-radius:7px; white-space:nowrap; background:#fff}
  .toolbar a:hover{background:#fff4f4; border-color:#f2c9cb}
  /* sidebar */
  .sidebar{border-right:1px solid var(--line); background:#fff; overflow:auto; display:flex; flex-direction:column}
  .search{position:sticky; top:0; background:#fff; padding:12px; border-bottom:1px solid var(--line); z-index:2}
  .search input{width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:13px}
  .list{padding:6px 6px 40px}
  .pill-group{font-size:10.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
    color:var(--muted); padding:12px 10px 5px; display:flex; justify-content:space-between}
  .pill-group .cnt{color:#aab0ba; font-weight:600}
  .art-link{display:block; text-decoration:none; color:inherit; padding:8px 10px; border-radius:8px;
    border-left:3px solid transparent; cursor:pointer}
  .art-link:hover{background:var(--bg)}
  .art-link.active{background:#fff4f4; border-left-color:var(--red)}
  .art-row{display:flex; gap:8px; align-items:baseline}
  .art-num{color:#aab0ba; font-variant-numeric:tabular-nums; font-size:12px; font-weight:600; min-width:20px}
  .art-title{font-size:13px; font-weight:600; line-height:1.35}
  .art-sub{margin-left:28px; margin-top:2px; display:flex; gap:6px; align-items:center; flex-wrap:wrap}
  .chip{font-size:10.5px; color:var(--muted); background:var(--bg); border:1px solid var(--line); border-radius:20px; padding:1px 8px}
  /* blog pane (center) */
  .blog{overflow:auto; background:#fff}
  .pane-empty{display:flex; height:100%; align-items:center; justify-content:center; color:var(--muted); text-align:center; padding:40px}
  .blog-head{position:sticky; top:0; background:#fff; padding:20px 30px 14px; border-bottom:1px solid var(--line); z-index:1}
  .blog-kicker{font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--red); margin-bottom:6px}
  .blog-h1{font-size:24px; font-weight:750; margin:0 0 10px; letter-spacing:-.01em; line-height:1.2}
  .blog-actions{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .viewlink{font-size:12.5px; color:var(--red); text-decoration:none; border:1px solid #f2c9cb; padding:6px 11px; border-radius:7px; background:#fff4f4; font-weight:600}
  .viewlink:hover{background:#ffe9ea}
  .draftnote{font-size:11.5px; color:#aab0ba}
  .article{padding:22px 30px 80px; max-width:720px; font-size:15.5px; line-height:1.68; color:#25292f}
  .article h1{font-size:22px; margin:30px 0 10px; line-height:1.25}
  .article h2{font-size:19px; font-weight:700; margin:28px 0 8px; line-height:1.3; letter-spacing:-.01em}
  .article h3{font-size:16px; font-weight:700; margin:22px 0 6px}
  .article p{margin:0 0 15px}
  .article ul,.article ol{margin:0 0 15px; padding-left:22px}
  .article li{margin:4px 0}
  .article a{color:var(--red); text-decoration:underline; text-underline-offset:2px}
  .article strong{font-weight:700}
  .article blockquote{margin:0 0 16px; padding:8px 16px; border-left:3px solid var(--line); color:#4a4f57; font-style:italic}
  .article hr{border:none; border-top:1px solid var(--line); margin:26px 0}
  .article code{background:var(--bg); border:1px solid var(--line); border-radius:4px; padding:1px 5px; font-size:.9em}
  .article table{border-collapse:collapse; width:100%; margin:6px 0 18px; font-size:14px}
  .article th,.article td{border:1px solid var(--line); padding:8px 10px; text-align:left; vertical-align:top}
  .article th{background:var(--bg); font-weight:700}
  /* posts pane (right) */
  .posts{overflow:auto; border-left:1px solid var(--line); background:var(--bg)}
  .posts-head{position:sticky; top:0; background:var(--bg); padding:16px 20px 12px; border-bottom:1px solid var(--line); z-index:1}
  .posts-title{font-size:13px; font-weight:700}
  .posts-sub{font-size:11.5px; color:var(--muted); margin-top:2px}
  .cards{padding:14px 18px 70px; display:grid; gap:14px}
  .plabel{font-size:10.5px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); margin:6px 2px 0; display:flex; align-items:center; gap:6px}
  .plabel .dot{width:8px;height:8px;border-radius:50%}
  .plabel .dot.li{background:var(--li)} .plabel .dot.fb{background:var(--fb)}
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; box-shadow:0 1px 2px rgba(20,20,40,.04)}
  .card-head{display:flex; align-items:center; gap:8px; margin-bottom:9px; flex-wrap:wrap}
  .vbadge{font-size:10.5px; font-weight:700; color:#fff; border-radius:6px; padding:2px 8px}
  .vbadge.li{background:var(--li)} .vbadge.fb{background:var(--fb)}
  .unit{font-size:11px; color:var(--muted); font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .sched{margin-left:auto; font-size:11.5px; color:var(--ink); background:var(--bg); border:1px solid var(--line); border-radius:20px; padding:2px 10px; font-weight:600; white-space:nowrap}
  .sched .d{color:var(--muted); font-weight:500}
  .body{font-size:14.5px; line-height:1.55; color:#22262e}
  .wc{font-size:10.5px; color:#aab0ba; margin-top:6px}
  .breakdown{margin-top:10px; border-top:1px dashed var(--line); padding-top:9px; display:grid; gap:5px}
  .bd{display:grid; grid-template-columns:64px 1fr; gap:8px; font-size:12px}
  .bd .l{color:var(--muted); font-weight:700; font-size:9.5px; letter-spacing:.05em; text-transform:uppercase; padding-top:2px}
  .bd .v{color:#3a3f47}
  .cardfoot{margin-top:11px; display:flex; gap:8px; align-items:center}
  .btn{font:inherit; font-size:11.5px; font-weight:600; cursor:pointer; border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:7px; padding:5px 10px}
  .btn:hover{background:var(--bg)}
  .postlink{font-size:11px; color:var(--muted); text-decoration:none; margin-left:auto}
  .postlink:hover{color:var(--red)}
  @media (max-width:1000px){
    body{grid-template-columns:1fr; grid-template-rows:auto auto auto auto auto; height:auto; min-height:100vh}
    .sidebar{max-height:38vh; border-bottom:1px solid var(--line)}
    .blog,.posts{overflow:visible}
    .posts{border-left:none; border-top:1px solid var(--line)}
    .blog-head,.posts-head,.search{position:static}
  }
  @media (max-width:560px){ .brand .t small{display:none} .meta{display:none} }

  /* Review mode: the comment widget adds a fixed 330px sidebar on the right and a
     46px banner on top. Reserve that space so the three columns SNAP into the
     remaining width — the widget never overlays nav / blog / posts, and every
     component in all three columns stays visible and commentable. (The 46px top
     banner is already offset by the widget's own body{padding-top:46px}.) */
  html[data-review-mode="on"] body{
    width: calc(100vw - 340px);
    grid-template-columns: 300px minmax(200px,1fr) 360px;
  }
  @media (max-width:1240px){
    html[data-review-mode="on"] body{
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto auto auto;
      height: auto; min-height: 100vh;
    }
    html[data-review-mode="on"] .sidebar{ max-height: 40vh; border-bottom:1px solid var(--line); }
    html[data-review-mode="on"] .blog, html[data-review-mode="on"] .posts{ overflow: visible; }
    html[data-review-mode="on"] .posts{ border-left:none; border-top:1px solid var(--line); }
    html[data-review-mode="on"] .blog-head, html[data-review-mode="on"] .posts-head, html[data-review-mode="on"] .search{ position: static; }
  }
</style>

<div id="hub-header" data-page="social-hub" data-hub="social" style="grid-column:1/-1"></div>
<script src="hub-header.js"></script>

<div class="topbar">
  <span class="meta" id="meta">Select an article — the blog opens here, its social posts on the right</span>
  <span class="toolbar">
    <a href="calendar.html" id="t-cal">Calendar ↗</a>
    <a href="https://start.credolegal.com" target="_blank" rel="noopener">credolegal.com ↗</a>
  </span>
</div>

<aside class="sidebar">
  <div class="search"><input id="q" type="search" placeholder="Search articles…  ( / )" autocomplete="off"></div>
  <div class="list" id="list"></div>
</aside>

<section class="blog" id="blog">
  <div class="pane-empty">Select an article on the left. The blog opens here; its 2 LinkedIn + 2 Facebook posts appear on the right.</div>
</section>

<aside class="posts" id="posts">
  <div class="pane-empty" style="padding:24px">Social posts appear here.</div>
</aside>

<script src="social-posts.js"></script>
<script src="articles-content.js"></script>
<script>
/* IIFE-scoped so nothing leaks into the classic-script global space shared with review-mode.js (which declares top-level esc/render). */
(function () {
  var DATA = window.CREDO_SOCIAL || { ARTICLES: [], POSTS: [] };
  var HTML = window.CREDO_ARTICLES_HTML || {};
  var ARTICLES = DATA.ARTICLES, POSTS = DATA.POSTS;
  var PILLAR_ORDER = DATA.PILLAR_ORDER || [];
  var postsBySlug = {};
  POSTS.forEach(function (p) { (postsBySlug[p.articleSlug] = postsBySlug[p.articleSlug] || []).push(p); });

  var $list = document.getElementById('list');
  var $blog = document.getElementById('blog');
  var $posts = document.getElementById('posts');
  var $meta = document.getElementById('meta');
  var $q = document.getElementById('q');
  var curSlug = null;

  function esc2(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  var MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtDate(iso){ var p = iso.split('-'); return MON[+p[1]-1] + ' ' + (+p[2]); }
  function byVar(a,b){ return a.variant < b.variant ? -1 : 1; }

  function matches(a, f){
    if (!f) return true; f = f.toLowerCase();
    return (a.title + ' ' + a.slug + ' ' + a.pillar + ' ' + a.pillarLabel + ' s' + a.lifecycle).toLowerCase().indexOf(f) > -1;
  }

  function renderList(){
    var f = $q.value.trim();
    var groups = {}; ARTICLES.forEach(function(a){ (groups[a.pillar]=groups[a.pillar]||[]).push(a); });
    var order = PILLAR_ORDER.filter(function(p){ return groups[p]; });
    Object.keys(groups).forEach(function(p){ if(order.indexOf(p)<0) order.push(p); });
    $list.innerHTML = '';
    var shown = 0;
    order.forEach(function(pil){
      var items = groups[pil].filter(function(a){ return matches(a, f); });
      if (!items.length) return;
      var h = document.createElement('div'); h.className = 'pill-group';
      h.innerHTML = '<span>' + esc2(items[0].pillarLabel) + '</span><span class="cnt">' + items.length + '</span>';
      $list.appendChild(h);
      items.forEach(function(a){
        var idx = ARTICLES.indexOf(a); shown++;
        var el = document.createElement('a'); el.className = 'art-link' + (a.slug === curSlug ? ' active' : '');
        el.href = '#' + a.slug; el.dataset.slug = a.slug;
        el.innerHTML =
          '<div class="art-row"><span class="art-num">' + String(idx+1).padStart(2,'0') + '</span>' +
          '<span class="art-title">' + esc2(a.title) + '</span></div>' +
          '<div class="art-sub"><span class="chip">' + esc2(a.pillar) + '</span>' +
          '<span class="chip">stage ' + esc2(a.lifecycle) + '</span><span class="chip">4 posts</span></div>';
        el.addEventListener('click', function(e){ e.preventDefault(); select(a.slug); });
        $list.appendChild(el);
      });
    });
    if (!shown) $list.innerHTML = '<div class="pill-group"><span>No matches</span></div>';
  }

  function postCard(p){
    var isLi = p.platform === 'linkedin';
    return '<div class="card">' +
      '<div class="card-head">' +
        '<span class="vbadge ' + (isLi?'li':'fb') + '">' + (isLi?'LinkedIn':'Facebook') + ' · ' + p.variant + '</span>' +
        '<span class="unit">' + esc2(p.unit) + '</span>' +
        '<span class="sched">' + esc2(p.dow) + ' <b>' + fmtDate(p.date) + '</b> <span class="d">2026</span></span>' +
      '</div>' +
      '<div class="body">' + esc2(p.body) + '</div>' +
      '<div class="wc">' + p.words + ' words</div>' +
      '<div class="breakdown">' +
        '<div class="bd"><span class="l">Context</span><span class="v">' + esc2(p.context) + '</span></div>' +
        '<div class="bd"><span class="l">Problem</span><span class="v">' + esc2(p.problem) + '</span></div>' +
        '<div class="bd"><span class="l">Advice</span><span class="v">' + esc2(p.advice) + '</span></div>' +
      '</div>' +
      '<div class="cardfoot">' +
        '<button class="btn" data-copy="' + p.id + '">Copy post</button>' +
        '<a class="postlink" href="' + esc2(p.link) + '" target="_blank" rel="noopener">blog link ↗</a>' +
      '</div></div>';
  }

  function renderBlog(a){
    var body = HTML[a.slug] || '<p class="draftnote">Article content not bundled.</p>';
    $blog.innerHTML =
      '<div class="blog-head">' +
        '<div class="blog-kicker">' + esc2(a.pillar) + ' · ' + esc2(a.pillarLabel) + ' · lifecycle stage ' + esc2(a.lifecycle) + '</div>' +
        '<h1 class="blog-h1">' + esc2(a.title) + '</h1>' +
        '<div class="blog-actions">' +
          '<a class="viewlink" href="' + esc2(a.link) + '" target="_blank" rel="noopener">View live blog ↗</a>' +
          '<span class="draftnote">Draft preview from content/blog/rewrites · publishes to ' + esc2(a.link.replace(/^https?:\/\//,'')) + '</span>' +
        '</div>' +
      '</div>' +
      '<article class="article">' + body + '</article>';
    $blog.scrollTop = 0;
  }

  function renderPosts(a){
    var mine = (postsBySlug[a.slug] || []);
    var li = mine.filter(function(p){ return p.platform==='linkedin'; }).sort(byVar);
    var fb = mine.filter(function(p){ return p.platform==='facebook'; }).sort(byVar);
    var all = mine.map(function(p){return p.date;}).sort();
    $posts.innerHTML =
      '<div class="posts-head"><div class="posts-title">Social posts derived from this article</div>' +
        '<div class="posts-sub">2 LinkedIn + 2 Facebook · scheduled ' + fmtDate(all[0]) + '–' + fmtDate(all[all.length-1]) + ', 2026</div></div>' +
      '<div class="cards">' +
        '<div class="plabel"><span class="dot li"></span>LinkedIn</div>' + li.map(postCard).join('') +
        '<div class="plabel"><span class="dot fb"></span>Facebook</div>' + fb.map(postCard).join('') +
      '</div>';
    $posts.querySelectorAll('[data-copy]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var p = mine.filter(function(x){ return x.id === btn.dataset.copy; })[0];
        navigator.clipboard && navigator.clipboard.writeText(p.body + '\n\n' + p.link);
        var t = btn.textContent; btn.textContent = 'Copied ✓'; setTimeout(function(){ btn.textContent = t; }, 1200);
      });
    });
    $posts.scrollTop = 0;
  }

  function select(slug){
    var a = ARTICLES.filter(function(x){ return x.slug === slug; })[0];
    if (!a) return;
    curSlug = slug;
    $meta.textContent = a.title + '  ·  ' + a.pillarLabel;
    history.replaceState(null, '', '#' + slug);
    renderList(); renderBlog(a); renderPosts(a);
    var active = $list.querySelector('.art-link.active');
    if (active) active.scrollIntoView({block:'nearest'});
  }

  $q.addEventListener('input', renderList);
  document.addEventListener('keydown', function(e){
    if (e.key === '/' && document.activeElement !== $q){ e.preventDefault(); $q.focus(); }
  });

  renderList();
  var hash = decodeURIComponent(location.hash.replace('#',''));
  if (hash && postsBySlug[hash]) select(hash);
})();
</script>

<script src="review.config.js"></script>
<script src="review-bootstrap.js"></script>
